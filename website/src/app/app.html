<main class="main">

  <head>
    <meta charset="utf-8">
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0'>
    <link rel="shortcut icon" href="favicon.png" type="image/webp">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
    <link rel="icon" href="favicon.png" type="image/webp">
    <title>York Raccoon Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  </head>

  @for (flake of snowFlakes; track $index ) {
    <snowflake [depth]="flake.depth" [speed]="flake.speed" [style.left.vw]="flake.left"></snowflake>
  }

  <div class="min-h-full flex-h-center" id="background_div">
    <input type="hidden" value="https://bio.link" id="app-url">
    <input type="hidden" value="null" id="is-featured">
    <canvas id="bg-canvas" class="background-overlay"></canvas>

    <div class="mt-48 page-full-wrap relative ">
      <input type="hidden" value="creator-page" id="page-type">
      <img class="display-image m-auto" data-src="donutinha_wizard_page_no_name.PNG"
        src="donutinha_wizard_page_no_name.PNG" alt="York Raccoon Image" />
      <h1 class="page-title page-text-color page-text-font mt-16 text-center">York "The Dork" Raccoon</h1>

      <div class="mt-24">
        <div class="page-item-wrap relative">
          <div class="page-item flex-both-center absolute"></div>
          <a target="_blank" class="page-item-each py-10 flex-both-center"
            href="https://bsky.app/profile/yorkdork.bsky.social" data-id="261652" data-type="page_item">
            <img class="link-each-image" data-src="bsky_logo.png" src="bsky_logo.png"
              alt="Bluesky @ yorkdork.bsky.com" />
            <span class=" item-title text-center">Bluesky</span>
          </a>
        </div>
        <div class="page-item-wrap relative">
          <div class="page-item flex-both-center absolute"></div>
          <a target="_blank" class="page-item-each py-10 flex-both-center"
            href="https://www.furaffinity.net/user/yorktheraccoon" data-id="261685" data-type="page_item">
            <img class="link-each-image" data-src="fa_logo.webp" src="fa_logo.webp"
              alt="Furaffinity @ [YorkTheRaccoon]" />
            <span class=" item-title text-center">Furaffinity</span>
          </a>
        </div>
        <!-- <div class="page-item-wrap relative">
            <div class="page-item flex-both-center absolute"></div>
            <a target="_blank" class="page-item-each py-10 flex-both-center" href="[Link]" data-id="261685"
              data-type="page_item">
              <img class="link-each-image" data-src="favicon.ico" src="favicon.ico"
                alt="Website @ [User]" />
              <span class=" item-title text-center">Website @ [User]</span>
            </a>
          </div> -->
      </div>
    </div>
  </div>

</main>

<router-outlet />
